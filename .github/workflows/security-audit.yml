name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --package-lock-only
      - name: Run npm audit
        run: npm audit --audit-level=high
      - name: Check for accidentally committed .env
        run: |
          if [ -f .env ]; then
            echo "ERROR: .env file is committed. This must never happen."
            exit 1
          fi
